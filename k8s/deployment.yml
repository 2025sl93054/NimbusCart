apiVersion: v1
kind: Namespace
metadata:
  name: nimbuscart
---
# ============ PostgreSQL ============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: nimbuscart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nimbuscart
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
---
# ============ Kafka (simplified) ============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: nimbuscart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          ports:
            - containerPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: nimbuscart
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
---
# ============ Zookeeper ============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: nimbuscart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
          ports:
            - containerPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: nimbuscart
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
---
# ============ Discovery Server ============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: nimbuscart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      containers:
        - name: discovery-server
          image: nimbuscart/discovery-server:latest
          ports:
            - containerPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: nimbuscart
spec:
  selector:
    app: discovery-server
  ports:
    - port: 8761
---
# ============ API Gateway ============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nimbuscart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: nimbuscart/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka/
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nimbuscart
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 8080
---
# ============ User Service ============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: nimbuscart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: nimbuscart/user-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/userdb
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka/
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: nimbuscart
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
---
